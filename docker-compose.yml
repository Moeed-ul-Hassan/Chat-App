
services:
  # 🍃 Persistent Database
  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: Echo
    volumes:
      - mongodata:/data/db

  # ⚡ Fast Cache & Presence
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # 🛡️ Echo Backend (Go + Air Hot-Reloading)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      - DB_NAME=Echo
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - REDIS_URL=redis:6379
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis

  # 🎨 Echo Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't overwrite node_modules from host
    environment:
      - VITE_API_URL=http://localhost:8001/api
      - VITE_BACKEND_URL=localhost:8001
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mongodata:
